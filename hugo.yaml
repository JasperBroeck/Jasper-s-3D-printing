# Hugo configuration file
baseURL: "https://jaspervdb.be/"
title: Jasper's 3D Printing

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Home
      pageRef: /
      weight: 1
    - name: Portfolio
      pageRef: /portfolio
      weight: 2

params:
  navbar:
    displayTitle: true
    displayLogo: false
  theme:
    default: light
    displayToggle: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: false
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
