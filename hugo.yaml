# Hugo configuration file
baseURL: "https://jaspervdb.be/"
title: Jasper's 3D Printing

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Home
      pageRef: /
      weight: 1
    - name: Portfolio
      pageRef: /portfolio
      weight: 2

params:
  externalLinkDecoration: true
  navbar:
    displayTitle: true
    displayLogo: false
  theme:
    default: light
    displayToggle: false
  footer:
    displayCopyright: true
    displayPoweredBy: true
    copyright: "© 2026 Jasper's 3D Printing. Alle rechten voorbehouden."
  editURL:
    enable: false
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
  page:
    width: wide
  analytics:
    umami:
      serverURL: "https://analytics.jaspervdb.be"
      websiteID: "de222700-21c2-4582-bbac-dd15132520ac"
